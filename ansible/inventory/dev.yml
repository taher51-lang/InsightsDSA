---
# Development targets: HTTPS with a locally trusted or browser-warning self-signed cert.
#
# Local dev machine: playbook runs against this host (no SSH hop).
#
# Typical usage:
#   ansible-playbook -i ansible/inventory/dev.yml ansible/site.yml
#
all:
  hosts:
    dev:
      ansible_host: localhost
      ansible_connection: local
      # ansible_python_interpreter: /usr/bin/python3
  vars:
    # Google OAuth: Web client IDs from Cloud Console → APIs & Services → Credentials.
    # Authorized redirect URIs must include exactly (with selfsigned HTTPS):
    #   https://dev.insightsdsa.local/login/callback
    # Uncomment and paste (or use ansible-vault / host_vars — do not commit real secrets).
    # insightsdsa_google_client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com"
    # insightsdsa_google_client_secret: "YOUR_SECRET"

    insightsdsa_tls_mode: selfsigned
    # Required: must match SAN on the certificate and how users reach the app.
    insightsdsa_server_name: dev.insightsdsa.local
    # Apt postgresql/redis-server ports (distinct from Omnibus/GitLab listeners on 5432/6379).
    insightsdsa_postgres_port: 5433
    insightsdsa_redis_port: 6380
    insightsdsa_install_postgres: true
    insightsdsa_install_redis: true
