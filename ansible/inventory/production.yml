---
# Production targets: HTTPS with Let's Encrypt certificates (certbot nginx plugin).
#
# DNS must point insightsdsa_server_name at this host before first deploy, or issuance fails.
#
# Typical usage:
#   ansible-playbook -i ansible/inventory/production.yml ansible/site.yml
#
all:
  hosts:
    prod:
      ansible_host: prod
      ansible_user: ubuntu
      # ansible_python_interpreter: /usr/bin/python3
  vars:
    # Set secrets (Fernet encryption key, Google OAuth) via vault — do not use repo defaults in prod.
    # insightsdsa_encryption_key: "{{ vault_insightsdsa_encryption_key }}"
    # insightsdsa_google_client_id: "{{ vault_google_client_id }}"
    # insightsdsa_google_client_secret: "{{ vault_google_client_secret }}"
    # Authorized redirect URI in Google Console: https://<insightsdsa_server_name>/login/callback

    insightsdsa_tls_mode: letsencrypt
    insightsdsa_server_name: insightsdsa.app
    # Required for Let's Encrypt ACME account / expiry notices.
    insightsdsa_certbot_admin_email: ops@example.com
    insightsdsa_install_postgres: true
    insightsdsa_install_redis: true
