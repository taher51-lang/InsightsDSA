---
# Distro packages only (/etc/postgresql/*). GitLab Omnibus Postgres is separate (e.g. /var/opt/gitlab/postgresql);
# this role does not reconfigure GitLab. Listen on postgres_listen_port alongside GitLab on 5432 is normal.
#
# Debian/Ubuntu postgresql.conf loads conf.d *before* the main `port =` line, so a conf.d override loses.
# Setting `port` here in the main cluster file matches the effective listener and what operators expect to see.

- name: Ensure PostgreSQL packages are installed
  ansible.builtin.apt:
    name: "{{ postgres_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Locate main cluster postgresql.conf (Debian/Ubuntu layout)
  ansible.builtin.shell:
    cmd: |
      set -e
      for f in /etc/postgresql/*/main/postgresql.conf; do
        if [ -f "$f" ]; then
          printf '%s\n' "$f"
          exit 0
        fi
      done
      exit 1
    executable: /bin/bash
  register: postgres_discover_conf
  changed_when: false

- name: Remove legacy conf.d snippet (previously overridden by main `port`; avoid duplicate directives)
  ansible.builtin.file:
    path: >-
      {{
        (postgres_discover_conf.stdout | trim | dirname)
        ~ '/conf.d/zzz-insightsdsa-port.conf'
      }}
    state: absent
  register: postgres_legacy_snippet_removed

- name: Set PostgreSQL listen TCP port in main postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgres_discover_conf.stdout | trim }}"
    regexp: '^#?\s*port\s*='
    line: "port = {{ postgres_listen_port }}"
    backup: true
  register: postgres_port_mainline

- name: Restart PostgreSQL when listen port config changed
  ansible.builtin.service:
    name: postgresql
    state: restarted
  when: postgres_port_mainline is changed or postgres_legacy_snippet_removed is changed

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Wait for distro PostgreSQL on configured TCP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ postgres_listen_port | int }}"
    timeout: 45
    delay: 2
    msg: >-
      Distro postgresql is not accepting connections on port {{ postgres_listen_port }}.
      Check `systemctl status postgresql` and `pg_lsclusters`; GitLab Postgres on 5432 is unrelated.
