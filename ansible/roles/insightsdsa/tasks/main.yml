---
- name: Validate application repo root exists on Ansible controller
  ansible.builtin.stat:
    path: "{{ insightsdsa_controller_source_dir }}"
  delegate_to: localhost
  register: insightsdsa_controller_src_stat

- name: Require local repository directory on Ansible controller
  ansible.builtin.assert:
    that:
      - insightsdsa_controller_src_stat.stat.exists
      - insightsdsa_controller_src_stat.stat.isdir
    fail_msg: >-
      Directory {{ insightsdsa_controller_source_dir }} not found on the Ansible controller (or playbook_dir dirname is wrong).
      Set insightsdsa_controller_source_dir to the InsightsDSA repository root — the folder that contains frontend/ alongside the Python app.

- name: Validate frontend directory exists under repo root on controller
  ansible.builtin.stat:
    path: "{{ insightsdsa_controller_source_dir }}/frontend"
  delegate_to: localhost
  register: insightsdsa_controller_frontend_stat

- name: Require frontend/ under repository root on controller
  ansible.builtin.assert:
    that:
      - insightsdsa_controller_frontend_stat.stat.exists
      - insightsdsa_controller_frontend_stat.stat.isdir
    fail_msg: >-
      Missing {{ insightsdsa_controller_source_dir }}/frontend on the Ansible controller.
      Ensure insightsdsa_controller_source_dir points at the full repo checkout, not a subdirectory.

- name: Ensure application UNIX group exists
  ansible.builtin.group:
    name: "{{ insightsdsa_deploy_group }}"
    system: true
    state: present
  when: insightsdsa_manage_app_unix_identity | bool

- name: Ensure application UNIX user exists
  ansible.builtin.user:
    name: "{{ insightsdsa_deploy_user }}"
    group: "{{ insightsdsa_deploy_group }}"
    groups: "{{ insightsdsa_runtime_user_secondary_groups }}"
    append: true
    system: true
    shell: /usr/sbin/nologin
    home: "{{ insightsdsa_app_path }}"
    create_home: false
  when: insightsdsa_manage_app_unix_identity | bool

- name: Install application OS dependencies
  ansible.builtin.apt:
    name: >-
      {{
        [
          'rsync',
          insightsdsa_python,
          insightsdsa_python ~ '-venv',
          insightsdsa_python ~ '-dev',
          'build-essential',
        ]
        + (['python3-psycopg2'] if insightsdsa_manage_postgres | bool else [])
      }}
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Node.js toolchain (frontend production build)
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
  when: insightsdsa_install_nodejs | bool

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ insightsdsa_deploy_user }}"
    group: "{{ insightsdsa_deploy_group }}"
    mode: "0755"
  loop:
    - "{{ insightsdsa_app_path }}"
    - "{{ insightsdsa_app_path }}/logs"

- name: Deploy application tree from Ansible controller (rsync)
  ansible.posix.synchronize:
    src: "{{ insightsdsa_controller_source_dir }}/"
    dest: "{{ insightsdsa_app_path }}/"
    archive: true
    checksum: true
    delete: "{{ insightsdsa_sync_delete | bool }}"
    # Older ansible.posix has no exclude=; rsync_opts is always supported.
    rsync_opts: "{{ insightsdsa_sync_excludes | map('regex_replace', '^', '--exclude=') | list }}"
  notify: Restart insightsdsa uwsgi

- name: Create Python virtualenv
  ansible.builtin.command:
    cmd: "{{ insightsdsa_python }} -m venv {{ insightsdsa_app_path }}/.venv"
    creates: "{{ insightsdsa_app_path }}/.venv/bin/pip"

- name: Upgrade pip in virtualenv
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ insightsdsa_app_path }}/.venv"

- name: Install InsightsDSA (editable) into virtualenv
  ansible.builtin.pip:
    name: "."
    chdir: "{{ insightsdsa_app_path }}"
    editable: true
    virtualenv: "{{ insightsdsa_app_path }}/.venv"
  notify: Restart insightsdsa uwsgi

- name: Install frontend dependencies
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ insightsdsa_app_path }}/frontend"
  when: insightsdsa_install_nodejs | bool
  register: insightsdsa_npm_ci
  changed_when: true

- name: Build Angular SPA for production
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ insightsdsa_app_path }}/frontend"
  when: insightsdsa_install_nodejs | bool
  register: insightsdsa_npm_build
  changed_when: true

- name: Deploy environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ insightsdsa_app_path }}/.env"
    owner: "{{ insightsdsa_deploy_user }}"
    group: "{{ insightsdsa_deploy_group }}"
    mode: "0640"
  notify: Restart insightsdsa uwsgi

- name: Create PostgreSQL application role
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ insightsdsa_db_user }}"
    password: "{{ insightsdsa_db_password }}"
    role_attr_flags: LOGIN
    login_port: "{{ insightsdsa_postgres_port | int }}"
  when: insightsdsa_manage_postgres | bool

- name: Create PostgreSQL application database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ insightsdsa_db_name }}"
    owner: "{{ insightsdsa_db_user }}"
    encoding: UTF-8
    template: template0
    login_port: "{{ insightsdsa_postgres_port | int }}"
  when: insightsdsa_manage_postgres | bool

- name: Run database schema (SQLAlchemy create_all + column guards)
  ansible.builtin.shell: |
    set -a
    source "{{ insightsdsa_app_path }}/.env"
    set +a
    exec "{{ insightsdsa_app_path }}/.venv/bin/python" -m insightsdsa.init_db
  args:
    executable: /bin/bash
    chdir: "{{ insightsdsa_app_path }}"
  register: insightsdsa_init_db
  changed_when: true

- name: Bootstrap curriculum (concepts + questions)
  ansible.builtin.shell: |
    set -a
    source "{{ insightsdsa_app_path }}/.env"
    set +a
    exec "{{ insightsdsa_app_path }}/.venv/bin/python" -m insightsdsa.appinit
  args:
    executable: /bin/bash
    chdir: "{{ insightsdsa_app_path }}"
  register: insightsdsa_appinit
  changed_when: true

- name: Install uWSGI into virtualenv
  ansible.builtin.pip:
    name: uwsgi
    virtualenv: "{{ insightsdsa_app_path }}/.venv"

- name: Deploy uWSGI configuration
  ansible.builtin.template:
    src: uwsgi.ini.j2
    dest: "{{ insightsdsa_app_path }}/uwsgi.ini"
    owner: "{{ insightsdsa_deploy_user }}"
    group: "{{ insightsdsa_deploy_group }}"
    mode: "0644"
  notify: Restart insightsdsa uwsgi

- name: Fix ownership of application tree
  ansible.builtin.file:
    path: "{{ insightsdsa_app_path }}"
    state: directory
    owner: "{{ insightsdsa_deploy_user }}"
    group: "{{ insightsdsa_deploy_group }}"
    recurse: true

- name: Install systemd unit for uWSGI
  ansible.builtin.template:
    src: insightsdsa-uwsgi.service.j2
    dest: "/etc/systemd/system/{{ insightsdsa_systemd_unit }}.service"
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart insightsdsa uwsgi

- name: Enable and start uWSGI service
  ansible.builtin.systemd:
    name: "{{ insightsdsa_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Configure nginx reverse proxy and TLS
  ansible.builtin.import_tasks: nginx_tls.yml
