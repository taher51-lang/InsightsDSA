---
# Override in inventory, host_vars, or encrypted group_vars (`ansible-vault`).
# Put secrets in e.g. `group_vars/all/vault.yml` and reference with `vault_*` vars.

insightsdsa_install_postgres: true
insightsdsa_install_redis: true
insightsdsa_install_nodejs: true
insightsdsa_python: python3

# Create DB role + database on this host (peer auth as postgres). Set false when
# Postgres is external or already provisioned (set DATABASE_* via .env manually).
insightsdsa_manage_postgres: true

# Application Unix account (uWSGI/systemd/files). Matches role defaults; override in inventory when needed.
insightsdsa_deploy_user: insightsdsa
insightsdsa_deploy_group: insightsdsa

# Deploy target on the managed host (repository root: `src/`, `wsgi.py`, `frontend/`).
insightsdsa_app_path: /srv/insightsdsa

# Application tree is synced from this path on the Ansible controller (repository root).
# Default: parent of ansible/ — override if you keep playbooks elsewhere.
# insightsdsa_controller_source_dir: /path/to/InsightsDSA

insightsdsa_db_name: insightsdsa
insightsdsa_db_user: insightsdsa
insightsdsa_db_password: "change-me-in-vault"
insightsdsa_postgres_host: 127.0.0.1
# Postgres/Redis TCP ports: defaults in ansible/roles/insightsdsa/defaults/main.yml — do not redefine
# here or inventory overrides (e.g. dev.yml 5433/6380) lose to playbook group_vars.
# postgres/redis roles set server listen port when insightsdsa_install_* is true.

insightsdsa_redis_host: 127.0.0.1
insightsdsa_redis_password: ""
insightsdsa_redis_db: 0

insightsdsa_flask_secret_key: "change-me-in-vault"
insightsdsa_encryption_key: ""
insightsdsa_session_cookie_secure: true
insightsdsa_session_cookie_samesite: Lax

insightsdsa_google_client_id: ""
insightsdsa_google_client_secret: ""
insightsdsa_google_redirect_uri: ""

# nginx server_name — default in role defaults; defining here loses to this file over inventory overrides.
# Set per inventory (e.g. dev.insightsdsa.local, insightsdsa.app).

# TLS mode is set per inventory: dev (selfsigned) vs production (letsencrypt).
# insightsdsa_tls_mode: none | selfsigned | letsencrypt
# insightsdsa_certbot_admin_email: required when using letsencrypt
insightsdsa_uwsgi_socket: /run/uwsgi/insightsdsa/uwsgi.sock
insightsdsa_uwsgi_workers: 4
insightsdsa_uwsgi_harakiri: 120

insightsdsa_log_dir: logs
