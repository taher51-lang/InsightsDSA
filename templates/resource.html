<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights DSA | Resource Hub</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-white: #ffffff;
            --pure-black: #000000; 
            --text-muted: #555555;
            --border-light: #e5e5e5;
            --hover-bg: #f9f9f9;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-white); 
            color: var(--pure-black); 
            margin: 0; 
            padding: 40px 20px; 
            -webkit-font-smoothing: antialiased;
        }

        .hub-container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        /* Header & Navigation Area */
        .hub-header { 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--pure-black); 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }

        .header-text h1 { 
            font-size: 2rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 800;
            margin: 0; 
            color: var(--pure-black);
        }

        .header-text p { 
            color: var(--text-muted); 
            margin: 5px 0 0 0; 
            font-size: 14px;
            font-weight: 500;
        }

        /* Back to Dashboard Button */
        .btn-back {
            background-color: var(--bg-white);
            color: var(--pure-black);
            border: 2px solid var(--pure-black);
            padding: 10px 18px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background-color: var(--pure-black);
            color: var(--bg-white);
        }

        /* Controls Section */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        #searchInput {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            background: var(--bg-white);
            color: var(--pure-black);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: var(--pure-black);
        }

        #searchInput::placeholder {
            color: #999;
        }

        .type-chips { display: flex; gap: 8px; }
        
        .chip {
            padding: 8px 16px;
            border: 1px solid var(--border-light);
            background: var(--bg-white);
            color: var(--pure-black);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .chip.active, .chip:hover {
            background: var(--pure-black);
            color: var(--bg-white);
            border-color: var(--pure-black);
        }

        /* Grid Layout */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .res-card {
            border: 1px solid var(--border-light);
            padding: 25px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
            transition: all 0.2s ease;
        }

        .res-card:hover {
            border-color: var(--pure-black);
            background-color: var(--hover-bg);
            transform: translateY(-2px);
        }

        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: inline-block;
            border: 1px solid var(--pure-black);
            color: var(--pure-black);
            padding: 3px 8px;
        }

        .topic-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .res-card h3 { 
            margin: 8px 0 12px 0; 
            font-size: 1.25rem; 
            font-weight: 800;
            color: var(--pure-black);
        }

        .res-card p { 
            font-size: 14px; 
            line-height: 1.6; 
            color: var(--text-muted); 
            flex-grow: 1; 
            margin-bottom: 24px;
        }

        .btn-link {
            text-decoration: none;
            color: var(--bg-white);
            background: var(--pure-black);
            text-align: center;
            padding: 12px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn-link:hover {
            opacity: 0.8;
        }
        
        /* Simple SVG Arrow for the back button */
        .back-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="hub-container">
    <header class="hub-header">
        <div class="header-text">
            <h1>Insights DSA Resources</h1>
            <p>Curated learning resources in monochrome style.</p>
        </div>
        <button onclick="window.location.href='/dashboard'" class="btn-back">
            <svg class="back-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Dashboard
        </button>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="SEARCH TOPICS OR RESOURCES..." onkeyup="renderResources()">
        <div class="type-chips">
            <button class="chip active" onclick="filterByType('all', this)">All</button>
            <button class="chip" onclick="filterByType('video', this)">Videos</button>
            <button class="chip" onclick="filterByType('notes', this)">Notes</button>
            <button class="chip" onclick="filterByType('visual', this)">Visuals</button>
        </div>
    </div>

    <div id="resourceGrid" class="resource-grid"></div>
</div>

<script>
    let currentType = 'all';

    const dsaData = [
        { 
            title: "Striver's A2Z Roadmap", 
            type: "video", 
            topic: "Full DSA", 
            desc: "The definitive video series for mastering algorithms from beginner to interview-ready.", 
            link: "https://www.youtube.com/playlist?list=PLgUwDviBIf0p-INQC6rMuzsSmdZ77EcrH" 
        },
        { 
            title: "VisuAlgo Visualizer", 
            type: "visual", 
            topic: "Concepts", 
            desc: "Interactive animations of data structures. Use this to see how nodes move in real-time.", 
            link: "https://visualgo.net/en" 
        },
        { 
            title: "Supreme DSA Notes", 
            type: "notes", 
            topic: "Handwritten", 
            desc: "Detailed Google Drive/GitHub notes covering core concepts with diagrams and code.", 
            link: "https://github.com/Ujjwal2327/DSA-SUPREME" 
        },
        { 
            title: "Algorithm Visualizer", 
            type: "visual", 
            topic: "Code-Sync", 
            desc: "An open-source project that visualizes algorithms as they execute line-by-line.", 
            link: "https://algorithm-visualizer.org/" 
        },
        { 
            title: "Apna College Notes", 
            type: "notes", 
            topic: "Revision", 
            desc: "Summarized PDF notes for quick revision before coding rounds or interviews.", 
            link: "https://www.apnacollege.in/notes" 
        },
        { 
            title: "Take U Forward - DP", 
            type: "video", 
            topic: "Dynamic Prog", 
            desc: "A specialized deep dive into DP problems, from memoization to tabular solutions.", 
            link: "https://www.youtube.com/watch?v=tyB0ztf0DNY&list=PLgUwDviBIf0qUlt5H_kiKYaNSqJge11yG" 
        }
    ];

    function filterByType(type, btn) {
        currentType = type;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        renderResources();
    }

    function renderResources() {
        const grid = document.getElementById('resourceGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        const filtered = dsaData.filter(item => {
            const matchesType = currentType === 'all' || item.type === currentType;
            const matchesSearch = item.title.toLowerCase().includes(searchTerm) || 
                                 item.topic.toLowerCase().includes(searchTerm);
            return matchesType && matchesSearch;
        });

        filtered.forEach(res => {
            grid.innerHTML += `
                <div class="res-card">
                    <div>
                        <span class="tag">${res.type}</span>
                        <div class="topic-label">// ${res.topic}</div>
                    </div>
                    <h3>${res.title}</h3>
                    <p>${res.desc}</p>
                    <a href="${res.link}" target="_blank" class="btn-link">View Resource</a>
                </div>
            `;
        });
    }

    renderResources();
</script>

</body>
</html>
