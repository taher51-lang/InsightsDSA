<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Workspace | InsightsDSA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body, html {
            height: 100%; margin: 0; overflow: hidden;
            background-color: var(--bg-dark); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
        }

        .top-nav { height: 60px; background: #010409; border-bottom: 1px solid var(--border); z-index: 100; }
        .main-wrapper { height: calc(100vh - 60px); }
        .pane { height: 100%; overflow-y: auto; padding: 2.5rem; }
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #484f58; border-radius: 10px; }

        .desc-area { line-height: 1.7; font-size: 1.05rem; }
        .desc-area pre { background: #000; padding: 1.2rem; border-radius: 8px; border: 1px solid var(--border); margin-top: 1rem; }
        
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner-border text-primary"></div>
    </div>

    <nav class="top-nav d-flex align-items-center justify-content-between px-4">
    <div class="d-flex align-items-center gap-3">
        <button onclick="history.back()" class="btn btn-link text-white-50 p-0 shadow-none">
            <i class="bi bi-arrow-left fs-4"></i>
        </button>
        <h5 id="q-title" class="mb-0 fw-bold text-white">Loading...</h5>
        <span id="q-diff" class="badge border border-secondary rounded-pill">--</span>
    </div>
    <button id="solve-btn" class="btn btn-sm fw-bold rounded-pill px-4 py-2 transition-all btn-success">
        <i class="bi bi-check2-circle me-1"></i> Mark Solved
    </button>
</nav>

<div class="col-lg-7 pane border-end border-secondary border-opacity-25">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h6 class="text-muted text-uppercase small fw-bold mb-0">Description</h6>
        <a id="leetcode-link" href="#" target="_blank" class="btn btn-link btn-sm text-primary text-decoration-none p-0">
            LeetCode <i class="bi bi-box-arrow-up-right small"></i>
        </a>
    </div>
    <div id="q-desc" class="desc-area"></div>
</div>

    <div class="container-fluid p-0 main-wrapper">
        <div class="row g-0 h-100">
            <div class="col-lg-7 pane border-end border-secondary border-opacity-25">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="text-muted text-uppercase small fw-bold mb-0">Description</h6>
                    <a id="leetcode-link" href="#" target="_blank" class="btn btn-link btn-sm text-primary text-decoration-none p-0">
                        LeetCode <i class="bi bi-box-arrow-up-right small"></i>
                    </a>
                </div>
                <div id="q-desc" class="desc-area"></div>
            </div>

            <div class="col-lg-5 pane d-flex flex-column bg-black bg-opacity-10 p-0">
                <div class="px-4 py-3 border-bottom border-secondary border-opacity-25 bg-dark bg-opacity-50">
                    <i class="bi bi-robot text-primary me-2"></i><span class="fw-bold small">AI TUTOR</span>
                </div>
                
                <div id="chat-flow" class="flex-grow-1 overflow-y-auto px-4 py-4 d-flex flex-column gap-3">
                    </div>

                <div class="p-4 border-top border-secondary border-opacity-25 bg-dark">
                    <div class="position-relative">
                        <textarea id="ai-input" class="form-control bg-dark text-white border-secondary rounded-4 shadow-none py-3 pe-5" 
                                  rows="2" placeholder="Ask a hint or paste code..."></textarea>
                        <button id="send-btn" class="btn btn-primary rounded-circle position-absolute bottom-0 end-0 m-2" style="width: 40px; height: 40px;">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/workspace.js"></script>
</body>
</html>
