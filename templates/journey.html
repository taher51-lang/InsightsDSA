<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Journey | InsightsDSA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <style>
        :root {
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-600: #475569;
            --slate-900: #0f172a;
            --indigo-600: #4f46e5;
        }

        body {
            background-color: var(--slate-50);
            font-family: 'Inter', sans-serif;
            color: var(--slate-900);
            padding-bottom: 80px;
        }

        .navbar-minimal {
            padding: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 700px;
            margin: 0 auto;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid var(--slate-200);
            border-radius: 8px;
            color: var(--slate-600);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            border-color: var(--indigo-600);
            color: var(--indigo-600);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .timeline-container {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        /* The Continuous Line */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 31px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--slate-200);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            padding-left: 60px;
        }

        /* The Elegant Node */
        .timeline-dot {
            position: absolute;
            left: 22px;
            top: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--indigo-600);
            z-index: 2;
            box-shadow: 0 0 0 4px var(--slate-50);
        }

        .premium-card {
            background: #ffffff;
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .premium-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: var(--slate-100);
            border-radius: 10px;
            color: var(--indigo-600);
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        .date-label {
            font-size: 0.8rem;
            color: var(--slate-600);
            font-weight: 600;
            letter-spacing: 0.025em;
        }

        .stat-pill {
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--slate-600);
        }
    </style>
</head>
<body>

<div class="container">
    <header class="navbar-minimal">
        <div>
            <h1 class="fw-bold h3 mb-1">Milestones</h1>
            <p class="text-muted small mb-0">Tracing your algorithmic growth.</p>
        </div>
        <a href="{{ url_for('dashboard') }}" class="btn-back">
            <i class="bi bi-grid-fill me-2"></i> Dashboard
        </a>
    </header>

    <main id="journey-timeline" class="timeline-container mt-4">
        <div class="text-center py-5">
            <div class="spinner-border text-indigo-600" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='journey_core.js') }}"></script>
</body>
</html>
