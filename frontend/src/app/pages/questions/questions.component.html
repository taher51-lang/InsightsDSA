<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <a routerLink="/dashboard" class="text-decoration-none text-muted small mb-2 d-block">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                    <h2 class="fw-bold text-dark">
                        Problem Set
                    </h2>
                </div>
                <div class="text-end">
                    <span class="badge bg-white text-dark shadow-sm p-2 px-3 rounded-pill border">
                        <span class="fw-bold text-primary">{{getSolvedCount()}}/{{questions.length}}</span> Solved
                    </span>
                </div>
            </div>
            
            <div class="table-responsive bg-white rounded-4 shadow-sm border border-light">
                <table class="table align-middle table-hover mb-0">
                    <tbody>
                        <tr *ngIf="loading">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <div class="spinner-border text-primary" role="status"></div>
                                <div class="mt-3 small fw-medium">Loading your neural pathway...</div>
                            </td>
                        </tr>
                        <tr *ngIf="!loading && questions.length === 0">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="bi bi-code-slash fs-3 d-block mb-2"></i>
                                No questions found for this concept.
                            </td>
                        </tr>
                        <tr *ngFor="let q of questions" class="align-middle mb-2">
                            <td class="ps-4" style="width: 60px;">
                                <div *ngIf="q.is_solved" class="bg-success-subtle p-2 rounded-circle text-center" style="width:35px; height:35px;">
                                    <i class="bi bi-check2 text-success fw-bold"></i>
                                </div>
                                <div *ngIf="!q.is_solved" class="bg-light p-2 rounded-circle text-center" style="width:35px; height:35px;">
                                    <i class="bi bi-circle text-secondary"></i>
                                </div>
                            </td>
                            <td>
                                <div class="fw-bold text-dark mb-0">{{q.title}}</div>
                                <a [href]="q.link" target="_blank" class="text-primary small text-decoration-none" style="font-size: 0.8rem;">
                                    View on LeetCode <i class="bi bi-box-arrow-up-right ms-1"></i>
                                </a>
                            </td>
                            <td>
                                <span class="badge rounded-pill px-3 py-2 border" [ngClass]="getBadgeClass(q.difficulty)">
                                    {{q.difficulty}}
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <a [routerLink]="['/question', q.id]" class="btn btn-sm btn-dark rounded-pill px-4 py-2 fw-medium shadow-sm transition-hover">
                                    Solve Problem <i class="bi bi-arrow-right-short ms-1 fs-5 align-middle"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
