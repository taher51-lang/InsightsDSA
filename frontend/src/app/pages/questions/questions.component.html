<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Problems</h3>
        <a routerLink="/dashboard" class="btn btn-outline-dark rounded-pill px-3">← Dashboard</a>
    </div>
    <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border spinner-border-sm" role="status"></div> Loading...
    </div>
    <div *ngIf="!loading && questions.length === 0" class="text-center py-5 text-muted">
        <i class="bi bi-code-slash fs-3 d-block mb-2"></i>
        No questions found for this concept.
    </div>
    <div *ngFor="let q of questions" class="card border-0 shadow-sm rounded-4 mb-2">
        <div class="card-body d-flex justify-content-between align-items-center p-3">
            <div class="d-flex align-items-center gap-3">
                <span *ngIf="q.is_solved" class="badge bg-success rounded-circle p-1" style="width:24px;height:24px;">
                    <i class="bi bi-check-lg"></i>
                </span>
                <span *ngIf="!q.is_solved" class="badge bg-secondary rounded-circle p-1" style="width:24px;height:24px;opacity:0.3;">
                    <i class="bi bi-dash"></i>
                </span>
                <div>
                    <h6 class="mb-0 fw-bold">{{q.title}}</h6>
                    <span class="badge rounded-pill px-2"
                        [class.bg-success-subtle]="q.difficulty === 'Easy'"
                        [class.text-success]="q.difficulty === 'Easy'"
                        [class.bg-warning-subtle]="q.difficulty === 'Medium'"
                        [class.text-warning]="q.difficulty === 'Medium'"
                        [class.bg-danger-subtle]="q.difficulty === 'Hard'"
                        [class.text-danger]="q.difficulty === 'Hard'">{{q.difficulty}}</span>
                </div>
            </div>
            <a [routerLink]="['/question', q.id]" class="btn btn-sm btn-dark rounded-pill px-3">Open →</a>
        </div>
    </div>
</div>
