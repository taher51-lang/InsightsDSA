<div class="hub-container">
    <header class="hub-header">
        <div class="header-text">
            <h1>Insights DSA Resources</h1>
            <p>Curated learning resources in monochrome style.</p>
        </div>
        <button routerLink="/dashboard" class="btn-back">
            <svg class="back-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Dashboard
        </button>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="SEARCH TOPICS OR RESOURCES..." (keyup)="onSearch($event)">
        <div class="type-chips">
            <button class="chip" [class.active]="currentType === 'all'" (click)="filterByType('all')">All</button>
            <button class="chip" [class.active]="currentType === 'video'" (click)="filterByType('video')">Videos</button>
            <button class="chip" [class.active]="currentType === 'notes'" (click)="filterByType('notes')">Notes</button>
            <button class="chip" [class.active]="currentType === 'visual'" (click)="filterByType('visual')">Visuals</button>
        </div>
    </div>

    <div id="resourceGrid" class="resource-grid">
        <div *ngFor="let res of filteredData" class="res-card">
            <div>
                <span class="tag">{{res.type}}</span>
                <div class="topic-label">// {{res.topic}}</div>
            </div>
            <h3>{{res.title}}</h3>
            <p>{{res.desc}}</p>
            <a [href]="res.link" target="_blank" class="btn-link">View Resource</a>
        </div>
    </div>
</div>
