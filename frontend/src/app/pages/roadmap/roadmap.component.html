<div class="container py-4 py-lg-5">
  <h1 class="h3 fw-bold mb-2">Roadmap</h1>
  <p class="text-muted mb-4">Solved counts per concept — use it to spot weak lanes.</p>

  @if (loadError) {
    <div class="alert alert-danger">{{ loadError }}</div>
  }

  <div class="card shadow-sm border-0 rounded-4">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Concept</th>
            <th class="text-end">Solved</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (r of rows; track r.id) {
            <tr>
              <td class="text-muted">{{ r.id }}</td>
              <td class="fw-semibold">{{ r.title }}</td>
              <td class="text-end">{{ r.solved_count }}</td>
              <td class="text-end">
                <a class="btn btn-sm btn-outline-dark" [routerLink]="['/questions', r.id]">Problems</a>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
