<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold"><i class="bi bi-map me-2"></i>Your Roadmap</h3>
        <a routerLink="/dashboard" class="btn btn-outline-dark rounded-pill px-3">← Dashboard</a>
    </div>
    <div class="row g-3">
        <div *ngFor="let c of concepts; let i = index" class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">{{c.title}}</h6>
                        <span class="badge bg-dark rounded-pill">Step {{i + 1}}</span>
                    </div>
                    <div class="progress mb-2" style="height: 6px;">
                        <div class="progress-bar bg-success" [style.width]="getProgress(c) + '%'"></div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">{{c.solved_count}} solved</small>
                        <a [routerLink]="['/questions', c.id]" class="btn btn-sm btn-outline-dark rounded-pill px-3">Solve →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
