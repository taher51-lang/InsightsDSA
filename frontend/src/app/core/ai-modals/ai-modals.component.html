<!-- AI Error Modal -->
<div class="modal fade" id="aiErrorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body text-center p-5">
                <div id="error-modal-icon" class="mb-4 d-inline-flex align-items-center justify-content-center" 
                     [class]="errorIconClass"
                     style="width: 60px; height: 60px; border-radius: 15px;" [innerHTML]="errorIconHtml">
                </div>
                
                <h4 class="fw-bold text-dark mb-2" id="error-modal-title">{{errorTitle}}</h4>
                <p class="text-muted mb-4" id="error-modal-message">{{errorMessage}}</p>
                
                <div class="d-grid gap-2" id="error-modal-actions">
                    <button *ngIf="errorStatus === 429" type="button" class="btn btn-dark rounded-pill py-2 fw-bold" data-bs-dismiss="modal">Got it</button>
                    <ng-container *ngIf="errorStatus === 401 || errorStatus === 402">
                        <button type="button" class="btn btn-dark rounded-pill py-2 fw-bold" (click)="handleHardReset()">Update Configuration</button>
                        <button type="button" class="btn btn-link text-muted text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- AI Settings Modal -->
<div class="modal fade" id="aiSettingsModal" tabindex="-1" aria-labelledby="aiSettingsModalLabel">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-light border-0 rounded-top-4 p-4">
        <h5 class="modal-title fw-bold"><i class="bi bi-cpu me-2 text-primary"></i>InsightsDSA Engine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-4">
          <label for="ai-provider" class="form-label fw-bold text-muted small">SELECT AI PROVIDER</label>
          <select id="ai-provider" class="form-select bg-light border-0 fw-medium" [(ngModel)]="provider">
            <option value="gemini">Google Gemini (Free Tier)</option>
            <option value="openai">OpenAI (ChatGPT)</option>
            <option value="grok">Grok (Xai)</option>
          </select>
        </div>
        <div class="mb-4">
          <label for="ai-api-key" class="form-label fw-bold text-muted small">YOUR API KEY</label>
          <input type="password" id="ai-api-key" class="form-control bg-light border-0" [placeholder]="keyPlaceholder" [(ngModel)]="apiKey">
          <div class="form-text text-primary mt-2">Stored strictly in your browser.</div>
        </div>
        
        <button class="btn btn-dark w-100 rounded-pill fw-bold py-2 mb-3" (click)="saveSettings()" [disabled]="isSaving">
          <span *ngIf="!isSaving">Save & Initialize</span>
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </button>

        <div class="text-center">
            <button type="button" class="btn btn-link text-muted small text-decoration-none" (click)="muteSettings()">
                Don't show this again
            </button>
        </div>
      </div>
    </div>
  </div>
</div>
